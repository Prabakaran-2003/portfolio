<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prabakaran S | Biomedical Engineer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to right, #f43f5e, #be123c);
      color: #ffffff;
      scroll-behavior: smooth;
    }

    header {
      background: transparent;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
    }

    nav a {
      margin: 0 1rem;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover {
      border-bottom: 2px solid #fff;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 4rem 2rem;
    }

    .hero-text {
      max-width: 600px;
    }

    .hero-text h2 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .hero-text h3 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .hero-text .btns a {
      margin-right: 1rem;
      background: #fff;
      color: #be123c;
      padding: 0.6rem 1.2rem;
      border-radius: 5px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .hero-text .btns a:hover {
      background: #f3f4f6;
    }

    .hero-img img {
      max-width: 300px;
      border-radius: 10px;
      border: 5px solid #fff;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.2);
      color: #f3f4f6;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Prabakaran S</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#projects">Projects</a>
      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-text">
      <p>I'm</p>
      <h2>Prabakaran S</h2>
      <h3>Biomedical Engineer</h3>
      <div class="btns">
        <a href="Prabakaran_Resume.pdf" download>Resume</a>
        <a href="mailto:prabakaranreal2003@gmail.com">Email Me</a>
      </div>
    </div>
    <div class="hero-img">
      <img src="profile.jpg" alt="Prabakaran S">
    </div>
  </section>

  <footer>
    &copy; 2025 Prabakaran S. All rights reserved.
  </footer>
</body>
</html>
